<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable · ANDREETTI</title>
<meta name="theme-color" content="#1A7A8A">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231A7A8A'/%3E%3Ctext x='50%25' y='52%25' font-family='Georgia,serif' font-size='40' fill='white' text-anchor='middle' dominant-baseline='central'%3EA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;font-weight:300;background:#F5FAFB;color:#111827;min-height:100vh;min-height:100svh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.card{background:#fff;border:1px solid #C8E0E5;border-radius:14px;padding:48px 40px;max-width:480px;box-shadow:0 12px 32px rgba(15,61,71,.12)}
.logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:24px}
.code{font-family:'Cormorant Garamond',Georgia,serif;font-size:64px;line-height:1;color:#1A7A8A;margin-bottom:8px}
h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:28px;margin-bottom:14px}
p{color:#374151;line-height:1.7;margin-bottom:28px}
a.btn{display:inline-block;background:#0F5A68;color:#fff;text-decoration:none;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border-radius:4px;transition:background .2s}
a.btn:hover{background:#0a4651}
.alt{display:inline-block;margin-top:18px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#1A7A8A;text-decoration:none}
.alt:hover{color:#0F5A68}
/* transition de page (cohérent avec le site) */
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
body{animation:pageIn .42s cubic-bezier(.4,0,.2,1) both}
body.leaving{animation:none;opacity:0;transform:translateY(-6px);transition:opacity .22s ease,transform .22s ease}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}body{animation:none}}
</style>
</head>
<body>
<div class="card">
<div class="logo">ANDREETTI</div>
<div class="code" aria-hidden="true">404</div>
<h1>Page introuvable</h1>
<p>Désolé, cette page n'existe pas ou a été déplacée.</p>
<a class="btn" href="/">Retour à l'accueil</a>
<a class="alt" href="links.html">Tous mes liens</a>
</div>
<script>
(function(){var r=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
document.addEventListener('click',function(e){var a=e.target.closest?e.target.closest('a'):null;if(!a)return;
var h=a.getAttribute('href');if(!h)return;if(a.target==='_blank'||a.hasAttribute('download'))return;
if(/^(mailto:|tel:|#)/i.test(h))return;if(/^https?:/i.test(h)&&a.hostname!==location.hostname)return;
if(e.metaKey||e.ctrlKey||e.shiftKey||e.button!==0)return;e.preventDefault();
if(r){location.href=h;return;}document.body.classList.add('leaving');setTimeout(function(){location.href=h;},200);});
window.addEventListener('pageshow',function(){document.body.classList.remove('leaving');});})();
</script>
</body>
</html>
